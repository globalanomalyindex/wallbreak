<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      /* mark that the wall-smash intro will play (so the hero is held pre-paint),
         but only when motion is allowed and the Web Animations API exists. */
      (function () {
        try {
          var ok = !window.matchMedia || !matchMedia("(prefers-reduced-motion: reduce)").matches;
          if (ok && "animate" in document.createElement("div")) {
            document.documentElement.classList.add("smash-intro");
          }
        } catch (e) {}
      })();
    </script>
    <title>wallbreak — copyrighted font tracker</title>
    <meta
      name="description"
      content="wallbreak is a cybersecurity tool that checks whether your paywalled fonts are exposed in public GitHub repositories. Read-only reconnaissance, leaves no trace. By Christopher Robin Fiore."
    />
    <meta name="author" content="Christopher Robin Fiore (globalanomalyindex)" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="fonts/SLTFDessignMaison-Regular.woff2"
      crossorigin
    />
    <link rel="stylesheet" href="styles.css" />
    <meta property="og:title" content="wallbreak — copyrighted font tracker" />
    <meta
      property="og:description"
      content="Find public GitHub repos that contain copies of your fonts. Read-only, no trace."
    />
    <meta name="theme-color" content="#b2c4c8" />
  </head>
  <body class="home">
    <main class="stage">
      <h1 class="wordmark reveal d1" aria-label="wallbreak">
        <span class="wm-wall" aria-hidden="true">wall</span><span
          class="wm-break"
          aria-hidden="true"
          >break</span
        >
      </h1>
      <p class="tagline reveal d2">copyrighted font tracker</p>
      <a
        class="cta reveal d3"
        href="app.html"
        aria-label="Open wallbreak and scan your fonts"
      >
        <span class="cta-arrow" aria-hidden="true">→</span>
      </a>
    </main>

    <footer class="footer reveal d4">
      <div class="footer-inner">
        <div class="footer-row">
          <p class="byline">by christopher robin <span class="ss01">fiore</span></p>
          <a class="link" href="case-study.html"
            >case study <span class="arrow" aria-hidden="true">→</span></a
          >
        </div>
        <a
          class="link other-projects"
          href="https://github.com/globalanomalyindex"
          target="_blank"
          rel="noopener noreferrer"
          >other projects :&gt;</a
        >
      </div>
    </footer>

    <script src="intro.js" defer></script>
  </body>
</html>
